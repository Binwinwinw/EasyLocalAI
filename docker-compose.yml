version: "3.8"

services:
  ollama:
    image: ollama/ollama
    container_name: ollama_upstream
    ports:
      - "11436:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  php_app:
    build: ./php
    ports:
      - "8002:80"
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ./config:/var/www/html/config
      - ./knowledge:/var/www/html/knowledge

volumes:
  ollama_data:
