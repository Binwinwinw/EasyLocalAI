version: "3.8"

services:
  ollama:
    image: ollama/ollama
    container_name: ollama_upstream
    ports:
      - "11436:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  php_app:
    build: ./php
    ports:
      - "8002:80"
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434

  local-ai:
    image: localai/localai:v2.24.0
    container_name: local-ai
    ports:
      - "8082:8080"
    volumes:
      - ./models:/models
      - ./config:/app/config
    environment:
      - MODELS_PATH=/models
      - DEBUG=true
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data:
