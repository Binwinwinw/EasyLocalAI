services:
  ollama:
    image: ollama/ollama
    container_name: ollama_upstream
    ports:
      - "11434:11434"
    volumes:
      - ${OLLAMA_MODELS_PATH:-ollama_data}:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G

  cortex_gateway:
    build: ./cortex_gateway
    container_name: cortex_gateway_v4
    ports:
      - "8003:8000"
    volumes:
      - ./gateway-config.yaml:/app/gateway-config.yaml
    environment:
      - OLLAMA_HOST=http://ollama_upstream:11434
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - CORTEX_API_KEY=${CORTEX_API_KEY}
    restart: unless-stopped
    depends_on:
      - ollama
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  php_app:
    build: .
    container_name: php_app_core
    ports:
      - "8002:80"
    depends_on:
      - ollama
      - cortex_gateway
    environment:
      - OLLAMA_INTERNAL_URL=http://ollama:11434
    volumes:
      - .:/var/www/html
      - ./config:/var/www/html/config
      - ./knowledge:/var/www/html/knowledge
      - /var/run/docker.sock:/var/run/docker.sock
      - C:/:/host/c:ro
      - F:/:/host/f:ro
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1.5G
