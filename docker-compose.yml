version: "3.8"

services:
  ollama:
    image: ollama/ollama
    container_name: ollama_upstream
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  php_app:
    build: ./php
    ports:
      - "8000:80"
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434

volumes:
  ollama_data:
