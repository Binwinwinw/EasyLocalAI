version: '3.8'

services:
  ollama:
    image: ollama/ollama
    container_name: ollama_prod
    volumes:
      - ollama_data:/root/.ollama
    restart: always
    # Pas d'exposition de port sur l'hôte en prod pour plus de sécurité (interne seulement)

  php_app:
    build: ./php
    container_name: easylocalai_prod
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ./config:/var/www/html/config
      - ./knowledge:/var/www/html/knowledge
    restart: always
    # En prod, on pourrait utiliser un port différent ou passer par un proxy Nginx
    ports:
      - "80:80"

volumes:
  ollama_data:
